name: Monthly DMI Computation

on:
  workflow_dispatch:
    inputs:
      reference_period:
        description: 'Reference period (YYYY-MM)'
        required: true
        default: '2026-04'

  schedule:
    # Run on the 15th after CPI release, but avoid top-of-hour GitHub Actions congestion.
    - cron: '17 10 15 * *'

env:
  PYTHON_VERSION: '3.9'

permissions:
  contents: write
  pull-requests: write

jobs:
  compute-dmi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set reference period
        id: period
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "period=${{ github.event.inputs.reference_period }}" >> $GITHUB_OUTPUT
          else
            echo "period=$(date -d 'last month' '+%Y-%m')" >> $GITHUB_OUTPUT
          fi

      - name: Fetch CPI data
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: |
          echo "Fetching CPI data for ${{ steps.period.outputs.period }}..."
          python -m scripts.test_bls_api

      - name: Check CE weights status
        run: |
          PERIOD_YEAR=$(echo "${{ steps.period.outputs.period }}" | cut -d'-' -f1)
          WEIGHTS_YEAR=$(python -c "import json; print(json.load(open('data/curated/weights_by_group_latest.json'))['weights_year'])")

          echo "Period year: $PERIOD_YEAR"
          echo "Current weights year: $WEIGHTS_YEAR"

          if [ $((PERIOD_YEAR - WEIGHTS_YEAR)) -gt 2 ]; then
            echo "⚠️ WARNING: Weights are $((PERIOD_YEAR - WEIGHTS_YEAR)) years old"
            echo "Consider updating CE weights"
          fi
          echo "WEIGHTS_YEAR=$WEIGHTS_YEAR" >> $GITHUB_ENV

      - name: Compute DMI Baseline
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: |
          echo "Computing baseline DMI for ${{ steps.period.outputs.period }}..."
          python -m scripts.compute_dmi_release ${{ steps.period.outputs.period }} --spec baseline --weights-year "$WEIGHTS_YEAR"

          test -f data/outputs/dmi_release_${{ steps.period.outputs.period }}.json
          test -f data/outputs/latest.json
          test -f data/outputs/releases.json

      - name: Compute DMI Slack+
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: |
          echo "Computing slack-plus DMI for ${{ steps.period.outputs.period }}..."
          python -m scripts.compute_dmi_release ${{ steps.period.outputs.period }} --spec slack_plus --weights-year "$WEIGHTS_YEAR"
          test -f data/outputs/dmi_release_${{ steps.period.outputs.period }}_slack_plus.json

      - name: Compute DMI Core
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: |
          echo "Computing core DMI for ${{ steps.period.outputs.period }}..."
          python -m scripts.compute_dmi_release ${{ steps.period.outputs.period }} --spec core --weights-year "$WEIGHTS_YEAR"

          test -f data/outputs/dmi_release_${{ steps.period.outputs.period }}_core.json

      - name: Build specifications manifest
        run: |
          python -m scripts.build_specifications_manifest ${{ steps.period.outputs.period }}
          test -f data/outputs/specifications.json

      - name: Update timeseries
        run: |
          echo "Appending ${{ steps.period.outputs.period }} to timeseries..."
          python -m scripts.update_timeseries ${{ steps.period.outputs.period }}

      - name: Run QA validation
        run: |
          echo "QA validation completed."

          QA_STATUS_BASELINE=$(python -c "import json; print(json.load(open('data/outputs/qa_report_${{ steps.period.outputs.period }}_baseline.json'))['status'])")
          QA_STATUS_SLACK_PLUS=$(python -c "import json; print(json.load(open('data/outputs/qa_report_${{ steps.period.outputs.period }}_slack_plus.json'))['status'])")
          QA_STATUS_CORE=$(python -c "import json; print(json.load(open('data/outputs/qa_report_${{ steps.period.outputs.period }}_core.json'))['status'])")

          if [ "$QA_STATUS_BASELINE" != "PASS" ] && [ "$QA_STATUS_BASELINE" != "PASS_WITH_WARNING" ]; then
            echo "❌ QA validation failed: $QA_STATUS_BASELINE"
            exit 1
          fi

          if [ "$QA_STATUS_SLACK_PLUS" != "PASS" ] && [ "$QA_STATUS_SLACK_PLUS" != "PASS_WITH_WARNING" ]; then
            echo "❌ QA validation failed: $QA_STATUS_SLACK_PLUS"
            exit 1
          fi

          if [ "$QA_STATUS_CORE" != "PASS" ] && [ "$QA_STATUS_CORE" != "PASS_WITH_WARNING" ]; then
            echo "❌ QA validation failed: $QA_STATUS_CORE"
            exit 1
          fi

          echo "✅ QA validation (Baseline): $QA_STATUS_BASELINE, (slack-plus): $QA_STATUS_SLACK_PLUS, (core): $QA_STATUS_CORE"

      - name: Sanity-check release manifest vs raw release
        run: |
          echo "Verifying releases.json/latest.json metrics match the raw baseline release for ${{ steps.period.outputs.period }}..."
          PERIOD="${{ steps.period.outputs.period }}" python <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          period = os.environ["PERIOD"]
          raw_path = Path(f"data/outputs/dmi_release_{period}.json")
          releases_path = Path("data/outputs/releases.json")
          latest_path = Path("data/outputs/latest.json")

          REQUIRED_METRICS = (
              "dmi_median",
              "dmi_stress",
              "income_pressure_spread",
              "income_pressure_tilt",
              "most_pressured_group",
              "least_pressured_group",
              "unemployment",
          )
          # Field names in raw summary_metrics differ for unemployment; pull that
          # one from the Q1 slack value, matching build_metrics_payload().
          NUMERIC_TOL = 1e-6

          raw = json.loads(raw_path.read_text())
          raw_summary = raw["summary_metrics"]
          raw_metrics = {
              "dmi_median": raw_summary["dmi_median"],
              "dmi_stress": raw_summary["dmi_stress"],
              "income_pressure_spread": raw_summary["income_pressure_spread"],
              "income_pressure_tilt": raw_summary["income_pressure_tilt"],
              "most_pressured_group": raw_summary["most_pressured_group"],
              "least_pressured_group": raw_summary["least_pressured_group"],
              "unemployment": raw["dmi_by_group"][0]["slack"],
          }

          # Guard against the original silent-zero bug: spread must match a non-zero
          # raw spread; tilt must agree in sign with raw tilt.
          if raw_metrics["income_pressure_spread"] <= 0:
              print(f"ERROR: raw income_pressure_spread is {raw_metrics['income_pressure_spread']}; expected positive.")
              sys.exit(1)

          def check_manifest(manifest_path: Path, label: str) -> int:
              manifest = json.loads(manifest_path.read_text())
              entries = [r for r in manifest["releases"] if r["release_id"] == period]
              if not entries:
                  print(f"ERROR: {label} has no entry for {period}.")
                  return 1
              entry_metrics = entries[0]["metrics"]
              errs = 0
              for key in REQUIRED_METRICS:
                  if key not in entry_metrics:
                      print(f"ERROR: {label} entry {period} missing metric '{key}'.")
                      errs += 1
                      continue
                  manifest_val = entry_metrics[key]
                  raw_val = raw_metrics[key]
                  if isinstance(raw_val, str):
                      if manifest_val != raw_val:
                          print(f"ERROR: {label} entry {period} metric '{key}': manifest={manifest_val!r}, raw={raw_val!r}")
                          errs += 1
                  else:
                      if abs(float(manifest_val) - float(raw_val)) > NUMERIC_TOL:
                          print(f"ERROR: {label} entry {period} metric '{key}': manifest={manifest_val}, raw={raw_val}")
                          errs += 1
              return errs

          errs = 0
          errs += check_manifest(releases_path, "releases.json")
          errs += check_manifest(latest_path, "latest.json")

          if errs:
              print(f"❌ Sanity check failed with {errs} mismatch(es).")
              sys.exit(1)
          print("✅ Sanity check passed: manifest metrics match raw release.")
          PY

      # =========================================
      # DEPLOYMENT TO IFASTNET (THIN MONTHLY DEPLOY)
      # =========================================

      - name: Prepare deployment package
        run: |
          echo "📦 Preparing deployment package (thin monthly deploy)..."
          PERIOD="${{ steps.period.outputs.period }}"

          # Create deploy directory structure
          mkdir -p deploy/data/outputs/published
          mkdir -p deploy/data/outputs/releases

          # Refresh the health endpoint from the just-generated workspace copy
          cp web/health.json deploy/health.json

          # Refresh release manifests used by the site and by manual deployments
          cp data/outputs/latest.json deploy/data/outputs/
          cp data/outputs/releases.json deploy/data/outputs/
          cp data/outputs/specifications.json deploy/data/outputs/

          # Copy release data files for THIS PERIOD only
          cp data/outputs/dmi_release_"$PERIOD"*.json deploy/data/outputs/
          cp data/outputs/qa_report_"$PERIOD"*.json deploy/data/outputs/
          cp data/outputs/dmi-"$PERIOD"*.csv deploy/data/outputs/ || true
          cp data/outputs/dmi-"$PERIOD"*.parquet deploy/data/outputs/ || true

          # Copy release notes
          cp data/outputs/releases/"$PERIOD".html deploy/data/outputs/releases/ || true

          # Copy published timeseries / lightweight published assets
          # IMPORTANT: exclude historical from routine monthly deploys
          rsync -a --exclude 'historical/' data/outputs/published/ deploy/data/outputs/published/

          # List deployment contents
          echo "📁 Deployment package contents:"
          find deploy -type f | sed -n '1,80p'

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.IFASTNET_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 1394 ${{ secrets.IFASTNET_SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to iFastNet via rsync
        run: |
          rsync -avz --progress \
            -e "ssh -i ~/.ssh/deploy_key -p 1394 -o StrictHostKeyChecking=no" \
            ./deploy/ \
            ${{ secrets.IFASTNET_SSH_USER }}@${{ secrets.IFASTNET_SSH_HOST }}:/home/agiraces/dmianalysis/

      - name: Deploy new historical file only (optional)
        run: |
          PERIOD="${{ steps.period.outputs.period }}"
          HIST_LOCAL="data/outputs/published/historical/dmi_release_${PERIOD}.json"
          HIST_REMOTE="/home/agiraces/dmianalysis/data/outputs/published/historical/"

          if [ -f "$HIST_LOCAL" ]; then
            echo "📦 Uploading historical delta: $HIST_LOCAL"
            rsync -avz \
              -e "ssh -i ~/.ssh/deploy_key -p 1394 -o StrictHostKeyChecking=no" \
              "$HIST_LOCAL" \
              ${{ secrets.IFASTNET_SSH_USER }}@${{ secrets.IFASTNET_SSH_HOST }}:"$HIST_REMOTE"
          else
            echo "ℹ️ No historical delta found for ${PERIOD}; skipping."
          fi

      - name: Deployment summary
        run: |
          PERIOD="${{ steps.period.outputs.period }}"
          echo "🚀 Deployment complete!"
          echo "   Dashboard: https://dmianalysis.org/dashboard.html"
          echo "   Health:    https://dmianalysis.org/health.json"
          echo "   Data (baseline):   https://dmianalysis.org/data/outputs/dmi_release_${PERIOD}.json"
          echo "   Data (slack_plus): https://dmianalysis.org/data/outputs/dmi_release_${PERIOD}_slack_plus.json"
          echo "   Data (core):       https://dmianalysis.org/data/outputs/dmi_release_${PERIOD}_core.json"


      - name: Ensure workflow files are not included in release PR
        run: |
          git restore --source=HEAD --staged --worktree .github/workflows || true

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            Add DMI release for ${{ steps.period.outputs.period }}

            - DMI computed for all quintiles
            - Baseline robustness variant generated
            - Slack-plus robustness variant generated
            - Core robustness variant generated
            - QA validation passed
          branch: release/${{ steps.period.outputs.period }}
          branch-suffix: timestamp
          title: 'DMI Release: ${{ steps.period.outputs.period }}'
          body: |
            ## DMI Release for ${{ steps.period.outputs.period }}
            
            **Automated monthly computation**
            
            ### Summary
            - **Reference Period**: ${{ steps.period.outputs.period }}
            - **DMI Results (baseline)**: `data/outputs/dmi_release_${{ steps.period.outputs.period }}.json`
            - **DMI Results (slack_plus)**: `data/outputs/dmi_release_${{ steps.period.outputs.period }}_slack_plus.json`
            - **DMI Results (core)**: `data/outputs/dmi_release_${{ steps.period.outputs.period }}_core.json`
            - **QA (baseline)**: `data/outputs/qa_report_${{ steps.period.outputs.period }}_baseline.json`
            - **QA (slack_plus)**: `data/outputs/qa_report_${{ steps.period.outputs.period }}_slack_plus.json`
            - **QA (core)**: `data/outputs/qa_report_${{ steps.period.outputs.period }}_core.json`
            
            ### Files Changed
            - `data/outputs/dmi_release_${{ steps.period.outputs.period }}.json`
            - `data/outputs/dmi_release_${{ steps.period.outputs.period }}_slack_plus.json`
            - `data/outputs/dmi_release_${{ steps.period.outputs.period }}_core.json`
            - `data/outputs/qa_report_${{ steps.period.outputs.period }}_baseline.json`
            - `data/outputs/qa_report_${{ steps.period.outputs.period }}_slack_plus.json`
            - `data/outputs/qa_report_${{ steps.period.outputs.period }}_core.json`
            - `data/outputs/specifications.json`
            
            ### Next Steps
            1. Review baseline vs slack_plus vs core for reasonableness
            2. Check QA warnings (especially weights vintage)
            3. Approve and merge to update repository
            
            > ✅ **Website automatically updated**: dmianalysis.org now shows data for ${{ steps.period.outputs.period }}
            
            ---
            *This PR was automatically created by the Monthly DMI workflow*
            
          labels: |
            automated
            release
          add-paths: |
            data/outputs/
            data/outputs/published/
            web/health.json

      - name: Auto-merge release PR
        if: steps.create-pr.outputs.pull-request-number
        run: gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --merge --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
