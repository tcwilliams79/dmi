name: Monthly DMI Computation

on:
  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      reference_period:
        description: 'Reference period (YYYY-MM)'
        required: true
        default: '2026-03'
  
  # Scheduled: 15th of each month at 10am UTC (after BLS CPI release)
  schedule:
    - cron: '0 10 15 * *'

env:
  PYTHON_VERSION: '3.9'

permissions:
  contents: write
  pull-requests: write

jobs:
  compute-dmi:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Set reference period
        id: period
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "period=${{ github.event.inputs.reference_period }}" >> $GITHUB_OUTPUT
          else
            # Auto-compute: previous month (CPI lags by ~2 weeks)
            echo "period=$(date -d 'last month' '+%Y-%m')" >> $GITHUB_OUTPUT
          fi
      
      - name: Fetch CPI data
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: |
          echo "Fetching CPI data for ${{ steps.period.outputs.period }}..."
          python -m scripts.test_bls_api
      
      - name: Check CE weights status
        run: |
          PERIOD_YEAR=$(echo "${{ steps.period.outputs.period }}" | cut -d'-' -f1)
          WEIGHTS_YEAR=$(python -c "import json; print(json.load(open('data/curated/weights_by_group_2023.json'))['weights_year'])")
          
          echo "Period year: $PERIOD_YEAR"
          echo "Current weights year: $WEIGHTS_YEAR"
          
          if [ $((PERIOD_YEAR - WEIGHTS_YEAR)) -gt 2 ]; then
            echo "⚠️ WARNING: Weights are $((PERIOD_YEAR - WEIGHTS_YEAR)) years old"
            echo "Consider updating CE weights"
          fi
      
      - name: Compute DMI
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: |
          echo "Computing DMI for explicit reference period ${{ steps.period.outputs.period }}..."
          python -m scripts.compute_dmi_release ${{ steps.period.outputs.period }}
          
          # Verify the expected release artifacts were generated for the requested period
          test -f data/outputs/dmi_release_${{ steps.period.outputs.period }}.json
          test -f data/outputs/latest.json
          test -f data/outputs/releases.json

      - name: Compute DMI Slack+
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: |
          python -m scripts.compute_dmi_release ${{ steps.period.outputs.period }} --spec slack_plus

      - name: Compute DMI Core
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: |
          python -m scripts.compute_dmi_release ${{ steps.period.outputs.period }} --spec core

      - name: Build specifications manifest
        run: |
          python -m scripts.build_specifications_manifest ${{ steps.period.outputs.period }}
      
      - name: Update timeseries
        run: |
          echo "Appending ${{ steps.period.outputs.period }} to timeseries..."
          python -m scripts.update_timeseries ${{ steps.period.outputs.period }}

      - name: Run QA validation
        run: |
          echo "QA validation completed (integrated in compute_dmi_release.py)"
          
          # Check if QA report exists for each spec and that QA passed
          QA_STATUS_BASELINE=$(python -c "import json; print(json.load(open('data/outputs/qa_report_${{ steps.period.outputs.period }}_baseline.json'))['status'])")
          QA_STATUS_SLACK_PLUS=$(python -c "import json; print(json.load(open('data/outputs/qa_report_${{ steps.period.outputs.period }}_slack_plus.json'))['status'])")
          QA_STATUS_CORE=$(python -c "import json; print(json.load(open('data/outputs/qa_report_${{ steps.period.outputs.period }}_core.json'))['status'])")
          
          if [ "$QA_STATUS_BASELINE" != "PASS" ] && [ "$QA_STATUS_BASELINE" != "PASS_WITH_WARNING" ]; then
            echo "❌ QA validation failed: $QA_STATUS_BASELINE"
            exit 1
          fi

          if [ "$QA_STATUS_SLACK_PLUS" != "PASS" ] && [ "$QA_STATUS_SLACK_PLUS" != "PASS_WITH_WARNING" ]; then
            echo "❌ QA validation failed: $QA_STATUS_SLACK_PLUS"
            exit 1
          fi

          if [ "$QA_STATUS_CORE" != "PASS" ] && [ "$QA_STATUS_CORE" != "PASS_WITH_WARNING" ]; then
            echo "❌ QA validation failed: $QA_STATUS_CORE"
            exit 1
          fi
          
          echo "✅ QA validation (Baseline): $QA_STATUS_BASELINE, (slack-plus): $QA_STATUS_SLACK_PLUS, (core): $QA_STATUS_CORE"
      
      # =========================================
      # FTP DEPLOYMENT TO IFASTNET
      # =========================================
      
      name: Monthly DMI Computation

on:
  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      reference_period:
        description: 'Reference period (YYYY-MM)'
        required: true
        default: '2026-03'
  
  # Scheduled: 15th of each month at 10am UTC (after BLS CPI release)
  schedule:
    - cron: '0 10 15 * *'

