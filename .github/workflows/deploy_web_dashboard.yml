name: Deploy Web Dashboard

on:
  push:
    branches: [ main ]
    paths:
      - 'web/dashboard.html'
      - 'web/dashboard/.htaccess'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-web-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Prepare dashboard deployment package
        run: |
          echo "Preparing web dashboard deployment package..."

          mkdir -p deploy/dashboard

          if [ ! -f "web/dashboard.html" ]; then
            echo "web/dashboard.html not found in repository"
            exit 1
          fi
          cp web/dashboard.html deploy/dashboard.html

          if [ ! -f "web/dashboard/.htaccess" ]; then
            echo "web/dashboard/.htaccess not found in repository"
            exit 1
          fi
          cp web/dashboard/.htaccess deploy/dashboard/.htaccess

          echo "Dashboard deployment contents:"
          find deploy -type f

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.IFASTNET_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 1394 ${{ secrets.IFASTNET_SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy dashboard to iFastNet via rsync
        run: |
          rsync -avz --progress \
            -e "ssh -i ~/.ssh/deploy_key -p 1394 -o StrictHostKeyChecking=no" \
            ./deploy/dashboard.html \
            ${{ secrets.IFASTNET_SSH_USER }}@${{ secrets.IFASTNET_SSH_HOST }}:/home/agiraces/dmianalysis/dashboard.html

      - name: Ensure /dashboard/ directory exists on iFastNet
        run: |
          ssh -i ~/.ssh/deploy_key -p 1394 -o StrictHostKeyChecking=no \
            ${{ secrets.IFASTNET_SSH_USER }}@${{ secrets.IFASTNET_SSH_HOST }} \
            'mkdir -p /home/agiraces/dmianalysis/dashboard'

      - name: Deploy /dashboard/.htaccess redirect to iFastNet via rsync
        run: |
          rsync -avz --progress \
            -e "ssh -i ~/.ssh/deploy_key -p 1394 -o StrictHostKeyChecking=no" \
            ./deploy/dashboard/.htaccess \
            ${{ secrets.IFASTNET_SSH_USER }}@${{ secrets.IFASTNET_SSH_HOST }}:/home/agiraces/dmianalysis/dashboard/.htaccess

      - name: Deployment summary
        run: |
          echo "Web dashboard deployment complete."
          echo "  Files deployed:"
          echo "    web/dashboard.html       -> /home/agiraces/dmianalysis/dashboard.html"
          echo "    web/dashboard/.htaccess  -> /home/agiraces/dmianalysis/dashboard/.htaccess"
          echo "  Site:"
          echo "    https://dmianalysis.org/dashboard.html (canonical)"
          echo "    https://dmianalysis.org/dashboard/     (301 -> /dashboard.html)"
